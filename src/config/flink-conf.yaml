# Flink Configuration File
# This file contains configuration options for PyFlink standalone mode

# Basic cluster setup for standalone mode
jobmanager.rpc.address: localhost
jobmanager.rpc.port: 6123
jobmanager.memory.process.size: 1024m
taskmanager.memory.process.size: 2048m
taskmanager.numberOfTaskSlots: 2
taskmanager.memory.task.heap.size: 1024m
taskmanager.memory.managed.size: 512m
parallelism.default: 2

# Disable web UI for standalone PyFlink job
web.submit.enable: false
web.cancel.enable: false
rest.port: 8083

# Checkpointing configuration
execution.checkpointing.interval: 60s
execution.checkpointing.timeout: 300s
execution.checkpointing.max-concurrent-checkpoints: 1
execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION

# State backend configuration
state.backend: filesystem
state.checkpoints.dir: s3a://iceberg-staging/checkpoints
state.savepoints.dir: s3a://iceberg-staging/savepoints

# Restart strategy
restart-strategy: fixed-delay
restart-strategy.fixed-delay.attempts: 3
restart-strategy.fixed-delay.delay: 30s

# High Availability (disabled for standalone mode)
high-availability: NONE

# S3/MinIO configuration for state backend
s3.endpoint: http://minio:9000
s3.access-key: minioadmin
s3.secret-key: minioadmin
s3.path.style.access: true

# Hadoop configuration for S3A
fs.s3a.endpoint: http://minio:9000
fs.s3a.access.key: minioadmin
fs.s3a.secret.key: minioadmin
fs.s3a.path.style.access: true
fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
fs.s3a.connection.ssl.enabled: false

# Execution configuration
execution.runtime-mode: STREAMING
classloader.resolve-order: child-first

# Additional PyFlink specific settings
python.execution.mode: process