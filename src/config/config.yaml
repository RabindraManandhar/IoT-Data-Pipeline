# IoT Data Ingestion Pipeline Configuration with PyFlink and PyIceberg
# This file contains all configuration options for the data pipeline

# Kafka configuration
kafka:
  # Multi-broker settings
  bootstrap_servers: kafka1:9092,kafka2:9092,kafka3:9092
  topic_name: iot-sensor-data
  consumer_group_id: iot-data-consumer
  auto_offset_reset: earliest
  
  # Replication and partition settings for fault tolerance
  replication_factor: 3
  partitions: 6
  
  # Topic configurations
  topic_config:
    min_insync_replicas: 2
    retention_ms: 604800000  # 7 days
    cleanup_policy: delete

  # Broker configurations
  brokers:
    # Kafka Broker 1
    kafka1:
      node_id: 1
      process_roles: broker,controller
      controller_quorum_voters: 1@kafka1:29093,2@kafka2:29093,3@kafka3:29093
      listeners: PLAINTEXT://kafka1:9092,CONTROLLER://kafka1:29093,PLAINTEXT_HOST://0.0.0.0:29092
      advertised_listeners: PLAINTEXT://kafka1:9092,PLAINTEXT_HOST://localhost:29092
      listener_security_protocol_map: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      inter_broker_listener_name: PLAINTEXT
      controller_listener_names: CONTROLLER
      port: 9092
      external_port: 29092
    
    # Kafka Broker 2
    kafka2:
      node_id: 2
      process_roles: broker,controller
      controller_quorum_voters: 1@kafka1:29093,2@kafka2:29093,3@kafka3:29093
      listeners: PLAINTEXT://kafka2:9092,CONTROLLER://kafka2:29093,PLAINTEXT_HOST://0.0.0.0:29092
      advertised_listeners: PLAINTEXT://kafka2:9092,PLAINTEXT_HOST://localhost:29093
      listener_security_protocol_map: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      inter_broker_listener_name: PLAINTEXT
      controller_listener_names: CONTROLLER
      port: 9092
      external_port: 29093

    # Kafka Broker 3
    kafka3:
      node_id: 3
      process_roles: broker,controller
      controller_quorum_voters: 1@kafka1:29093,2@kafka2:29093,3@kafka3:29093
      listeners: PLAINTEXT://kafka3:9092,CONTROLLER://kafka3:29093,PLAINTEXT_HOST://0.0.0.0:29092
      advertised_listeners: PLAINTEXT://kafka3:9092,PLAINTEXT_HOST://localhost:29094
      listener_security_protocol_map: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      inter_broker_listener_name: PLAINTEXT
      controller_listener_names: CONTROLLER
      port: 9092
      external_port: 29094

# MQTT configuration
mqtt:
  broker_host: mosquitto
  broker_port: 1883
  topic: ruuvitag/data
  client_id: ruuvitag_adapter
  qos: 1
  keep_alive: 60
  reconnect_interval: 10

  # Security 
  # username: mqtt_user
  # password: mqtt_password

# Schema Registry configuration
schema_registry:
  url: http://schema-registry:8081
  auto_register_schemas: true
  compatibility_level: BACKWARD
  subject_name_strategy: TopicNameStrategy
  
  # Schema paths
  schema_dir: src/schemas
  sensor_schema_file: iot_sensor_reading.avsc
  
  # Serialization settings
  serialize_format: avro
  
  # Replication factor for schemas topic
  kafkastore_topic_replication_factor: 3

# IoT Simulator configuration
iot_simulator:
  num_devices: 8
  data_generation_interval_sec: 1.0
  device_types: ["temperature", "humidity", "pressure", "motion", "light"]
  anomaly_probability: 0.05

# RuuviTag configuration
ruuviTag:
  # Device parameters
  device_type: ruuvitag
  default_location:
    latitude: 60.1699
    longitude: 24.9384
    building: building-1
    floor: 1
    zone: main
    room: room-101
  battery:
    # RuuviTag uses CR2477 battery (3.0V nominal)
    # Map voltage to percentage (approx)
    # 3.0V = 100%, 2.0V = 0%
    min_voltage: 2.0
    max_voltage: 3.0
  anomaly_thresholds:
    temperature_min: -50
    temperature_max: 50
    humidity_min: 15
    humidity_max: 100
    pressure_min: 87000
    pressure_max: 108500
    battery_low: 2.0
  signal_strength: -80 # (actual BLE RSSI could be used if available)
  firmware_version: 3.31.1 # (actual firmware version could be used if available)

# NEW: PyFlink configuration
flink:
  # Job configuration
  jobs:
    kafka_to_iceberg:
      name: kafka-to-iceberg-etl
      parallelism: 2
      consumer_group: flink-iceberg-consumer
      
      # Batch settings for Iceberg writes
      batch_size: 1000
      batch_timeout_ms: 30000  # 30 seonds
      
      # Schema evolution
      schema_evolution_enabled: true

# NEW: PyIceberg configuration
iceberg:
  # Catalog configuration
  catalog:
    type: sql
    name: iot_catalog
    uri: postgresql://iceberg:iceberg@postgres:5432/iceberg_catalog
    warehouse: s3a://iceberg-warehouse/
    
  # Storage configuration (MinIO/S3)
  storage:
    type: s3
    endpoint: http://minio:9000
    access_key: minioadmin
    secret_key: minioadmin
    path_style_access: true
    region: us-east-1
    
  # Table configuration
  tables:
    # Default namespace for IoT data
    namespace: iot_data
    
    # Partitioning strategy
    partitioning:
      device_buckets: 16  # Number of device buckets
      time_granularity: hour  # hour, day, month
      
    # Table properties
    properties:
      format_version: 2
      compression: snappy
      delete_after_commit: true
      previous_versions_max: 5
      
    # Schema evolution
    schema_evolution:
      auto_add_columns: true
      compatibility_check: true
      
  # Write optimization
  write:
    # File size targets
    target_file_size_mb: 128
    max_file_size_mb: 256
    
    # Compaction
    auto_compaction: true
    compaction_trigger_mb: 512
    
    # Batching
    batch_size: 1000
    flush_interval_ms: 30000

# NEW: MinIO configuration
minio:
  endpoint: http://minio:9000
  access_key: minioadmin
  secret_key: minioadmin
  region: us-east-1
  
  # Bucket configuration
  buckets:
    warehouse: iceberg-warehouse
    staging: iceberg-staging
    
  # Lifecycle policies
  lifecycle:
    staging_expiry_days: 7
    old_versions_expiry_days: 30

# NEW: PostgreSQL configuration
postgres:
  host: postgres
  port: 5432
  database: iceberg_catalog
  username: iceberg
  password: iceberg
  
  # Connection pool settings
  pool:
    min_connections: 5
    max_connections: 20
    connection_timeout: 30
    
  # Schema settings
  schema: iceberg
  auto_create_schema: true
  
# Logging configuration
logging:
  level: INFO
  format: "<green>{time:YYYY-MM-DD HH:mm:ss.SSS}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"
  
  # File logging for production
  file_logging:
    enabled: false  # Set to true in production
    log_dir: logs
    max_size: 10MB  # Size before rotation
    retention: 1 week
    compression: zip
    
    # Error-specific logging
    error_log:
      enabled: true
      retention: 1 month

# Producer configuration
producer:
  client_id: iot-data-producer
  
  # Reliability settings
  acks: all
  retries: 5
  retry_backoff_ms: 500
  max_in_flight_requests_per_connection: 1
  
  # Performance tuning
  queue_buffering_max_ms: 5
  queue_buffering_max_kbytes: 32768
  batch_num_messages: 1000
  socket_timeout_ms: 30000
  message_timeout_ms: 10000
  
  # Compression
  compression_type: snappy

# Consumer configuration
consumer:
  # Commit settings
  enable_auto_commit: true
  auto_commit_interval_ms: 5000
  
  # Performance settings
  fetch_min_bytes: 1
  
  # Fault tolerance settings
  session_timeout_ms: 30000
  heartbeat_interval_ms: 10000
  max_poll_interval_ms: 300000
  
  # Load balancing
  partition_assignment_strategy: cooperative-sticky

# UI configuration
kafka_ui:
  port: 8080
  cluster_name: local-cluster

# NEW: Flink UI configuration
flink_ui:
  port: 8082
  cluster_name: iot-flink-cluster

# Application settings
app:
  name: IoT Data Pipeline (Multi-Broker with Schema Registry + PyFlink + PyIceberg)
  environment: development  # Change to production for production deployment

# NEW: Monitoring and alerting configuration
monitoring:
  # Health check intervals
  health_check_interval_ms: 30000
  
  # Metrics collection
  metrics:
    enabled: true
    interval_ms: 60000
    
    # Flink metrics
    flink:
      job_metrics: true
      task_metrics: true
      checkpoint_metrics: true
      
    # Iceberg metrics
    iceberg:
      table_metrics: true
      write_metrics: true
      compaction_metrics: true
      
  # Alerting thresholds
  alerts:
    # Kafka lag alerts
    kafka_lag_threshold: 10000
    
    # Flink job alerts
    flink_restart_threshold: 3
    flink_checkpoint_failure_threshold: 5
    
    # Iceberg write alerts
    iceberg_write_failure_threshold: 10
    iceberg_batch_delay_threshold_ms: 300000  # 5 minutes

# NEW: GCS configuration (for future deployment)
gcs:
  # Service account configuration
  credentials_path: /secrets/gcs-credentials.json
  project_id: your-gcp-project-id
  
  # Storage configuration
  storage:
    bucket: your-iceberg-warehouse-bucket
    region: us-central1
    storage_class: STANDARD
    
  # BigQuery integration (optional)
  bigquery:
    dataset: iot_analytics
    location: US
    
  # Pub/Sub integration (optional)
  pubsub:
    topic: iot-sensor-data
    subscription: flink-consumer